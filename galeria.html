<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería — FibroLaser</title>
    <link rel="icon" type="image/svg+xml" href="favicon-fibrolaser.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-page {
            padding: 8rem 0 4rem;
        }

        .gallery-page .section-header {
            margin-bottom: 3rem;
        }

        .gallery-grid-large {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .gallery-grid-large .gallery-item {
            aspect-ratio: 1/1;
            opacity: 0;
            transform: translateY(20px);
        }

        .gallery-grid-large .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-grid-large .gallery-item:nth-child(1).visible { transition-delay: 0.03s; }
        .gallery-grid-large .gallery-item:nth-child(2).visible { transition-delay: 0.06s; }
        .gallery-grid-large .gallery-item:nth-child(3).visible { transition-delay: 0.09s; }
        .gallery-grid-large .gallery-item:nth-child(4).visible { transition-delay: 0.12s; }
        .gallery-grid-large .gallery-item:nth-child(5).visible { transition-delay: 0.15s; }
        .gallery-grid-large .gallery-item:nth-child(6).visible { transition-delay: 0.18s; }
        .gallery-grid-large .gallery-item:nth-child(7).visible { transition-delay: 0.21s; }
        .gallery-grid-large .gallery-item:nth-child(8).visible { transition-delay: 0.24s; }
        .gallery-grid-large .gallery-item:nth-child(9).visible { transition-delay: 0.27s; }
        .gallery-grid-large .gallery-item:nth-child(10).visible { transition-delay: 0.3s; }
        .gallery-grid-large .gallery-item:nth-child(11).visible { transition-delay: 0.33s; }
        .gallery-grid-large .gallery-item:nth-child(12).visible { transition-delay: 0.36s; }
        .gallery-grid-large .gallery-item:nth-child(13).visible { transition-delay: 0.39s; }
        .gallery-grid-large .gallery-item:nth-child(14).visible { transition-delay: 0.42s; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            object-fit: contain;
            cursor: default;
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: rotate(90deg);
        }

        .lightbox-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .lightbox-nav.prev { left: 24px; }
        .lightbox-nav.next { right: 24px; }

        @media (max-width: 968px) {
            .gallery-grid-large {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .gallery-grid-large {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }

            .lightbox-nav {
                width: 36px;
                height: 36px;
            }

            .lightbox-nav.prev { left: 12px; }
            .lightbox-nav.next { right: 12px; }
        }
    </style>
</head>
<body>

                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <button class="lightbox-nav prev" id="lightboxPrev">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18l6-6-6-6"/>

    <footer>
        <div class="container">

    <script src="script.js"></script>
    <script>
        const images = Array.from(document.querySelectorAll('#galleryGrid .gallery-item img')).filter(Boolean);

        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxCounter = document.getElementById('lightboxCounter');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');
        let currentIndex = 0;

        function openLightbox(index) {
            if (index < 0 || index >= images.length) return;
            currentIndex = index;
            const img = images[index];
            lightboxImage.src = img.src;
            lightboxImage.alt = img.alt;
            lightboxCounter.textContent = `${index + 1} / ${images.length}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function navigateLightbox(dir) {
            const newIndex = currentIndex + dir;
            if (newIndex >= 0 && newIndex < images.length) {
                openLightbox(newIndex);
            }
        }

        document.querySelectorAll('#galleryGrid .gallery-item').forEach((item, index) => {
            item.addEventListener('click', () => openLightbox(index));
        });

        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', () => navigateLightbox(-1));
        lightboxNext.addEventListener('click', () => navigateLightbox(1));

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });
    </script>
</body>
</html>
